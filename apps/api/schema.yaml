openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/auth/token/:
    post:
      operationId: api_auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: api_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/deals/:
    get:
      operationId: api_deals_list
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: 案件名または顧客名を部分一致検索するためのクエリパラメータ。
      - in: query
        name: status
        schema:
          type: string
        description: 案件ステータスで絞り込むためのクエリパラメータ。
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deal'
          description: ''
    post:
      operationId: api_deals_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Deal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Deal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Deal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
          description: ''
  /api/deals/{deal_id}/activities/:
    get:
      operationId: api_deals_activities_list
      parameters:
      - in: path
        name: deal_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
          description: ''
    post:
      operationId: api_deals_activities_create
      parameters:
      - in: path
        name: deal_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ActivityCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ActivityCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityCreate'
          description: ''
  /api/deals/{id}/:
    get:
      operationId: api_deals_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
          description: ''
    put:
      operationId: api_deals_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Deal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Deal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Deal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
          description: ''
    patch:
      operationId: api_deals_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDeal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDeal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDeal'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
          description: ''
  /api/schema/:
    get:
      operationId: api_schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /health/:
    get:
      operationId: health_retrieve
      tags:
      - health
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Health check response
components:
  schemas:
    Activity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        deal:
          type: integer
        activity_type:
          $ref: '#/components/schemas/ActivityTypeEnum'
        date:
          type: string
          format: date
        memo:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - activity_type
      - created_at
      - date
      - deal
      - id
      - updated_at
    ActivityCreate:
      type: object
      description: /deals/{id}/activities の POST 用（dealはURLから決める）
      properties:
        date:
          type: string
          format: date
        activity_type:
          $ref: '#/components/schemas/ActivityTypeEnum'
        memo:
          type: string
          nullable: true
      required:
      - activity_type
      - date
    ActivityTypeEnum:
      enum:
      - call
      - email
      - meeting
      type: string
      description: |-
        * `call` - 電話
        * `email` - メール
        * `meeting` - ミーティング
    Deal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: integer
          readOnly: true
        deal_name:
          type: string
          maxLength: 255
        client_name:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusEnum'
        next_follow_up_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
          readOnly: true
      required:
      - activities
      - client_name
      - created_at
      - deal_name
      - id
      - owner
      - updated_at
    PatchedDeal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: integer
          readOnly: true
        deal_name:
          type: string
          maxLength: 255
        client_name:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusEnum'
        next_follow_up_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
          readOnly: true
    StatusEnum:
      enum:
      - new
      - contacted
      - proposed
      - won
      - lost
      - on_hold
      - needs_follow_up
      type: string
      description: |-
        * `new` - 新規
        * `contacted` - 連絡済み
        * `proposed` - 提案中
        * `won` - 獲得
        * `lost` - お断り
        * `on_hold` - 保留
        * `needs_follow_up` - 要フォロー
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
