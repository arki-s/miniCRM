services:
  db:
    image: postgres:16-alpine
    container_name: mini-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_crm}
      POSTGRES_USER: ${POSTGRES_USER:-mini_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_crm}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini_crm} -d ${POSTGRES_DB:-mini_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
